<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTorrent P2P文件传输（修复版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f7fa;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #007aff;
            color: white;
        }
        button:hover {
            background: #0056cc;
        }
        button:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            resize: vertical;
            word-break: break-all;
            margin-bottom: 12px;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
        }
        .status-info {
            background: #e5f2ff;
            color: #0066cc;
        }
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        .log-box {
            width: 100%;
            min-height: 60px;
            padding: 8px;
            border: 1px solid #eee;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-family: monospace;
        }
        .btn-copy {
            background: #ff9500;
            margin-right: 8px;
        }
        .btn-copy:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
    <h1>📤 P2P文件传输（WebTorrent修复版）</h1>

    <div class="container">
        <!-- 分享文件区 -->
        <div class="section">
            <div class="section-title">1. 分享文件（生成链接）</div>
            <input type="file" id="fileInput" accept="*">
            <button onclick="shareFile()">生成分享链接</button>
            
            <div id="shareStatus" class="status status-info">
                选择文件后点击生成链接，支持任意格式文件
            </div>

            <textarea id="magnetLink" readonly placeholder="生成的分享链接会显示在这里..."></textarea>
            <button class="btn-copy" onclick="copyMagnetLink()" disabled>复制链接</button>
            <div id="shareLog" class="log-box">日志：等待操作...</div>
        </div>

        <!-- 下载文件区 -->
        <div class="section">
            <div class="section-title">2. 下载文件（粘贴链接）</div>
            <textarea id="downloadMagnetLink" placeholder="粘贴对方发来的分享链接..."></textarea>
            <button onclick="downloadFile()">开始下载</button>
            
            <div id="downloadStatus" class="status status-info">
                粘贴链接后点击开始下载
            </div>
            <div id="fileResult" style="margin-top: 12px; font-size: 14px; color: #666;"></div>
        </div>
    </div>

    <!-- 改用更稳定的CDN + 增加兼容性适配 -->
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@2.1.34/webtorrent.min.js"></script>
    <script>
        // 全局变量
        let client = null;
        let currentTorrent = null;
        const fileInput = document.getElementById('fileInput');
        const magnetLink = document.getElementById('magnetLink');
        const shareStatus = document.getElementById('shareStatus');
        const shareLog = document.getElementById('shareLog');
        const downloadMagnetLink = document.getElementById('downloadMagnetLink');
        const downloadStatus = document.getElementById('downloadStatus');
        const fileResult = document.getElementById('fileResult');
        const copyBtn = document.getElementById('copyMagnetLink');

        // 初始化WebTorrent客户端（增加容错配置）
        function initClient() {
            try {
                // 销毁旧客户端
                if (client) client.destroy();
                
                // 创建新客户端，配置公共Tracker（国内可用）
                client = new WebTorrent({
                    tracker: {
                        rtcConfig: {
                            iceServers: [
                                { urls: 'stun:stun.qq.com:3478' },
                                { urls: 'stun:stun.cloudflare.com:3478' }
                            ]
                        }
                    },
                    maxConns: 100
                });

                // 客户端错误监听
                client.on('error', (err) => {
                    logShare(`客户端错误：${err.message}`);
                    updateShareStatus(`❌ 客户端初始化失败：${err.message}`, 'error');
                });

                logShare('WebTorrent客户端初始化成功');
                return true;
            } catch (e) {
                logShare(`初始化失败：${e.message}`);
                updateShareStatus(`❌ WebTorrent加载失败：${e.message}`, 'error');
                return false;
            }
        }

        // 更新分享状态
        function updateShareStatus(text, type = 'info') {
            shareStatus.textContent = text;
            shareStatus.className = `status status-${type}`;
        }

        // 更新下载状态
        function updateDownloadStatus(text, type = 'info') {
            downloadStatus.textContent = text;
            downloadStatus.className = `status status-${type}`;
        }

        // 分享日志
        function logShare(text) {
            shareLog.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            console.log('ShareLog:', text);
        }

        // ==================== 分享文件（核心修复） ====================
        async function shareFile() {
            // 1. 检查文件
            const file = fileInput.files[0];
            if (!file) {
                updateShareStatus('⚠️ 请先选择要分享的文件', 'error');
                logShare('未选择文件');
                return;
            }
            logShare(`选择文件：${file.name} (${(file.size/1024/1024).toFixed(2)}MB)`);

            // 2. 初始化客户端
            if (!initClient()) {
                return;
            }

            // 3. 重置状态
            magnetLink.value = '';
            copyBtn.disabled = true;
            updateShareStatus('🔄 正在生成分享链接...', 'info');

            try {
                // 4. 生成种子和磁力链接（核心修复：增加错误捕获）
                logShare('开始生成种子文件...');
                currentTorrent = client.seed(file, {
                    name: file.name,
                    pieceLength: 16384 // 适配小文件
                }, (torrent) => {
                    // 生成成功回调
                    const link = torrent.magnetURI;
                    magnetLink.value = link;
                    copyBtn.disabled = false;
                    
                    logShare(`链接生成成功：${link.substring(0, 50)}...`);
                    updateShareStatus(`✅ 链接生成成功！文件：${file.name}`, 'success');
                    
                    // 监听种子状态
                    torrent.on('warning', (warn) => logShare(`警告：${warn.message}`));
                    torrent.on('error', (err) => logShare(`种子错误：${err.message}`));
                });

                // 5. 监听种子创建过程
                currentTorrent.on('error', (err) => {
                    logShare(`种子创建失败：${err.message}`);
                    updateShareStatus(`❌ 生成链接失败：${err.message}`, 'error');
                });

            } catch (e) {
                logShare(`分享失败：${e.message}`);
                updateShareStatus(`❌ 生成链接异常：${e.message}`, 'error');
            }
        }

        // 复制磁力链接
        function copyMagnetLink() {
            try {
                magnetLink.select();
                document.execCommand('copy');
                updateShareStatus('✅ 链接已复制到剪贴板', 'success');
                logShare('链接复制成功');
            } catch (e) {
                updateShareStatus('⚠️ 复制失败，请手动复制', 'error');
                logShare(`复制失败：${e.message}`);
            }
        }

        // ==================== 下载文件 ====================
        function downloadFile() {
            const link = downloadMagnetLink.value.trim();
            if (!link) {
                updateDownloadStatus('⚠️ 请先粘贴分享链接', 'error');
                return;
            }

            // 初始化客户端
            if (!initClient()) {
                return;
            }

            // 重置状态
            fileResult.innerHTML = '';
            updateDownloadStatus('🔄 正在连接节点并开始下载...', 'info');

            try {
                // 加入磁力链接
                client.add(link, (torrent) => {
                    logShare(`开始下载：${torrent.name}`);
                    updateDownloadStatus(`🔗 已连接到${torrent.numPeers}个节点`, 'info');

                    // 下载进度
                    torrent.on('progress', (progress) => {
                        const percent = Math.floor(progress * 100);
                        updateDownloadStatus(`📥 下载中：${percent}%`, 'info');
                        fileResult.innerHTML = `
                            <div>文件名：${torrent.name}</div>
                            <div>进度：${percent}%</div>
                            <div>已连接节点：${torrent.numPeers}个</div>
                        `;
                    });

                    // 下载完成
                    torrent.on('done', () => {
                        updateDownloadStatus('✅ 下载完成！点击下方链接保存', 'success');
                        fileResult.innerHTML = `<div>✅ 下载完成：${torrent.name}</div>`;
                        
                        // 生成下载链接
                        torrent.files.forEach((file) => {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(file);
                            a.download = file.name;
                            a.textContent = `下载 ${file.name}`;
                            a.style.display = 'block';
                            a.style.margin = '8px 0';
                            a.style.color = '#007aff';
                            fileResult.appendChild(a);
                        });
                    });

                    // 节点连接
                    torrent.on('peer', (peer) => {
                        updateDownloadStatus(`🔗 已连接${torrent.numPeers}个节点，开始下载...`, 'info');
                        logShare(`新节点连接：${peer.id}`);
                    });
                });

            } catch (e) {
                updateDownloadStatus(`❌ 下载失败：${e.message}`, 'error');
                logShare(`下载错误：${e.message}`);
            }
        }

        // 页面加载时初始化
        window.onload = () => {
            logShare('页面加载完成，等待选择文件...');
            updateShareStatus('已就绪，选择文件开始分享', 'info');
        };
    </script>
</body>
</html>
