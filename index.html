<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简P2P文件传输（WebTorrent版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f7fa;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #007aff;
            color: white;
        }
        button:hover {
            background: #0056cc;
        }
        button:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            resize: vertical;
            word-break: break-all;
            margin-bottom: 12px;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
        }
        .status-info {
            background: #e5f2ff;
            color: #0066cc;
        }
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #007aff;
            width: 0%;
            transition: width 0.3s ease;
        }
        .file-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .btn-copy {
            background: #ff9500;
            margin-right: 8px;
        }
        .btn-copy:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
    <h1>📤 P2P文件传输（WebTorrent版）</h1>

    <div class="container">
        <!-- 分享文件区 -->
        <div class="section">
            <div class="section-title">1. 分享文件（生成链接）</div>
            <input type="file" id="fileInput" accept="*">
            <button onclick="shareFile()">生成分享链接</button>
            
            <div id="shareStatus" class="status status-info">
                选择文件后点击生成链接，支持任意格式文件
            </div>

            <textarea id="magnetLink" readonly placeholder="生成的分享链接会显示在这里..."></textarea>
            <button class="btn-copy" onclick="copyMagnetLink()" disabled>复制链接</button>
        </div>

        <!-- 下载文件区 -->
        <div class="section">
            <div class="section-title">2. 下载文件（粘贴链接）</div>
            <textarea id="downloadMagnetLink" placeholder="粘贴对方发来的分享链接..."></textarea>
            <button onclick="downloadFile()">开始下载</button>
            
            <div id="downloadStatus" class="status status-info">
                粘贴链接后点击开始下载
            </div>

            <div class="progress-bar">
                <div id="downloadProgress" class="progress-fill"></div>
            </div>

            <div id="fileResult" class="file-info"></div>
        </div>
    </div>

    <!-- 引入WebTorrent核心库（国内CDN） -->
    <script src="https://cdn.bootcdn.net/ajax/libs/webtorrent/2.1.34/webtorrent.min.js"></script>
    <script>
        // 创建WebTorrent客户端（自动连接公共Tracker，无需手动信令）
        const client = new WebTorrent();
        
        const fileInput = document.getElementById('fileInput');
        const magnetLink = document.getElementById('magnetLink');
        const shareStatus = document.getElementById('shareStatus');
        const downloadMagnetLink = document.getElementById('downloadMagnetLink');
        const downloadStatus = document.getElementById('downloadStatus');
        const downloadProgress = document.getElementById('downloadProgress');
        const fileResult = document.getElementById('fileResult');
        const copyBtn = document.getElementById('copyMagnetLink');

        // 更新分享状态
        function updateShareStatus(text, type = 'info') {
            shareStatus.textContent = text;
            shareStatus.className = `status status-${type}`;
        }

        // 更新下载状态
        function updateDownloadStatus(text, type = 'info') {
            downloadStatus.textContent = text;
            downloadStatus.className = `status status-${type}`;
        }

        // ==================== 分享文件（生成磁力链接） ====================
        function shareFile() {
            const file = fileInput.files[0];
            if (!file) {
                updateShareStatus('⚠️ 请先选择要分享的文件', 'error');
                return;
            }

            updateShareStatus('🔄 正在生成分享链接...', 'info');

            // 用WebTorrent创建种子并生成磁力链接
            client.seed(file, (torrent) => {
                // 生成磁力链接（核心：无需手动信令，直接分享这个链接即可）
                const link = torrent.magnetURI;
                magnetLink.value = link;
                copyBtn.disabled = false;
                
                updateShareStatus(`✅ 链接生成成功！文件：${file.name}`, 'success');
                fileResult.textContent = `分享中：${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            });
        }

        // 复制磁力链接
        function copyMagnetLink() {
            magnetLink.select();
            document.execCommand('copy');
            updateShareStatus('✅ 链接已复制到剪贴板，发给对方即可', 'success');
        }

        // ==================== 下载文件（粘贴磁力链接） ====================
        function downloadFile() {
            const link = downloadMagnetLink.value.trim();
            if (!link) {
                updateDownloadStatus('⚠️ 请先粘贴分享链接', 'error');
                return;
            }

            // 清空之前的下载状态
            downloadProgress.style.width = '0%';
            fileResult.textContent = '';
            updateDownloadStatus('🔄 正在连接节点并开始下载...', 'info');

            // 加入磁力链接开始下载（自动完成P2P连接，无需手动信令）
            client.add(link, (torrent) => {
                // 监听下载进度
                torrent.on('progress', (progress) => {
                    const percent = Math.floor(progress * 100);
                    downloadProgress.style.width = `${percent}%`;
                    updateDownloadStatus(`📥 下载中：${percent}% (连接节点数：${torrent.numPeers})`, 'info');
                });

                // 下载完成
                torrent.on('done', () => {
                    updateDownloadStatus('✅ 下载完成！点击下方链接保存文件', 'success');
                    downloadProgress.style.width = '100%';

                    // 遍历下载的文件，生成下载链接
                    torrent.files.forEach((file) => {
                        file.appendTo(fileResult); // 自动生成下载按钮
                        fileResult.innerHTML += `<br>文件大小：${(file.size / 1024 / 1024).toFixed(2)} MB`;
                    });
                });

                // 节点连接成功
                torrent.on('peer', () => {
                    updateDownloadStatus(`🔗 已连接${torrent.numPeers}个节点，开始下载...`, 'info');
                });
            });

            // 错误处理
            client.on('error', (err) => {
                updateDownloadStatus(`❌ 下载错误：${err.message}`, 'error');
            });
        }
    </script>
</body>
</html>
