<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Private Browser BT</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: auto;
        }

        #drop {
            border: 2px dashed #666;
            padding: 40px;
            margin: 20px 0;
            text-align: center;
        }

        progress {
            width: 100%;
            height: 20px;
        }
    </style>
</head>

<body>

    <h2>私密浏览器 BT 传输</h2>

    房间号：<input id="room" value="room123">
    <button id="init">初始化客户端</button>

    <h3>生成的 Magnet</h3>
    <textarea id="magnet" style="width:100%;height:80px;"></textarea>

    <div id="drop">拖拽文件到这里开始做种</div>

    <h3>下载</h3>
    <input id="magnetInput" placeholder="粘贴 magnet 链接">
    <button id="downloadBtn">开始下载</button>

    <h3>进度</h3>
    <progress id="progress" value="0" max="100"></progress>

    <script>

        let client;

        init.onclick = () => {
            client = new WebTorrent({
                tracker: {
                    rtcConfig: {
                        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
                    }
                },
                dht: false
            });
            alert("客户端初始化完成");
        };

        drop.ondragover = e => e.preventDefault();

        drop.ondrop = e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;

            const roomName = room.value;

            client.seed(file, {
                announce: [
                    "wss://tracker.openwebtorrent.com"
                ],
                name: file.name + "_" + roomName
            }, torrent => {
                magnet.value = torrent.magnetURI;
                console.log("Seeding:", torrent.magnetURI);
            });
        };

        downloadBtn.onclick = () => {
            const uri = magnetInput.value;

            client.add(uri, {
                announce: [
                    "wss://tracker.openwebtorrent.com"
                ]
            }, torrent => {

                torrent.on("download", () => {
                    const percent = (torrent.progress * 100).toFixed(2);
                    progress.value = percent;
                });

                torrent.on("done", () => {
                    torrent.files.forEach(file => {
                        file.getBlobURL((err, url) => {
                            const a = document.createElement("a");
                            a.href = url;
                            a.download = file.name;
                            a.click();
                        });
                    });
                });

            });
        };

    </script>

</body>

</html>
