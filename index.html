<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从原理出发的P2P文件传输</title>
    <style>
        body { max-width: 600px; margin: 20px auto; padding: 20px; font-family: Arial, sans-serif; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; font-size: 18px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px 0; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; font-size: 12px; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; }
        .ok { background: #d4edda; color: #155724; }
        .err { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        input[type="file"] { margin: 10px 0; }
        a { display: block; margin-top: 10px; padding: 10px; background: #28a745; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>🔧 从原理出发的P2P文件传输</h1>

    <!-- ========================================== -->
    <!-- 第一步：房主（发起连接的人） -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📤 第一步：我是房主（发起连接）</h2>
        <div id="host-status" class="status info">等待操作...</div>
        
        <!-- 1. 选择要发送的文件 -->
        <input type="file" id="host-file">
        
        <!-- 2. 点击生成“我的名片” (Offer) -->
        <button id="host-create-offer" disabled>1. 生成我的连接名片 (Offer)</button>
        
        <!-- 3. 复制“我的名片”发给对方 -->
        <textarea id="host-offer" readonly placeholder="这里会显示房主的Offer名片，复制发给接收方"></textarea>
        <button id="host-copy-offer" disabled>复制房主名片</button>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">

        <!-- 4. 粘贴“对方的名片” (Answer) -->
        <p>粘贴接收方发回的名片 (Answer)：</p>
        <textarea id="host-answer" placeholder="在这里粘贴接收方的Answer名片"></textarea>
        <button id="host-connect" disabled>2. 确认连接</button>
    </div>

    <!-- ========================================== -->
    <!-- 第二步：接收方（加入连接的人） -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📥 第二步：我是接收方（加入连接）</h2>
        <div id="client-status" class="status info">等待操作...</div>

        <!-- 1. 粘贴“房主的名片” (Offer) -->
        <p>粘贴房主发来的名片 (Offer)：</p>
        <textarea id="client-offer" placeholder="在这里粘贴房主的Offer名片"></textarea>
        <button id="client-create-answer" disabled>1. 生成我的名片 (Answer)</button>

        <!-- 2. 复制“我的名片”发回给房主 -->
        <textarea id="client-answer" readonly placeholder="这里会显示接收方的Answer名片，复制发回房主"></textarea>
        <button id="client-copy-answer" disabled>复制我的名片</button>
    </div>

    <!-- ========================================== -->
    <!-- 第三步：传输文件 -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📁 第三步：文件传输</h2>
        <div id="transfer-status" class="status info">等待连接建立...</div>
        <div id="file-result"></div>
    </div>

    <script>
        // ==========================================
        // 0. 全局配置与变量
        // ==========================================
        
        // STUN服务器：用于帮两台设备“穿透”网络，找到对方
        // 这里用了腾讯和Cloudflare的公共服务器，国内稳定
        const CONFIG = {
            iceServers: [
                { urls: 'stun:stun.qq.com:3478' },
                { urls: 'stun:stun.cloudflare.com:3478' }
            ]
        };

        // 全局变量
        let hostPeer = null;    // 房主的P2P连接对象
        let clientPeer = null;  // 接收方的P2P连接对象
        let fileToSend = null;  // 房主选择的要发送的文件
        let hostChannel = null; // 房主的数据传输通道

        // DOM元素快捷引用
        const dom = {
            hostStatus: document.getElementById('host-status'),
            clientStatus: document.getElementById('client-status'),
            transferStatus: document.getElementById('transfer-status'),
            hostFile: document.getElementById('host-file'),
            hostCreateOffer: document.getElementById('host-create-offer'),
            hostOffer: document.getElementById('host-offer'),
            hostCopyOffer: document.getElementById('host-copy-offer'),
            hostAnswer: document.getElementById('host-answer'),
            hostConnect: document.getElementById('host-connect'),
            clientOffer: document.getElementById('client-offer'),
            clientCreateAnswer: document.getElementById('client-create-answer'),
            clientAnswer: document.getElementById('client-answer'),
            clientCopyAnswer: document.getElementById('client-copy-answer'),
            fileResult: document.getElementById('file-result')
        };

        // ==========================================
        // 辅助函数：更新状态
        // ==========================================
        function setStatus(element, text, type = 'info') {
            element.textContent = text;
            element.className = `status ${type}`;
            console.log(`[${type.toUpperCase()}]`, text);
        }

        // ==========================================
        // 第一步：房主逻辑
        // ==========================================

        // 1.1 房主选择文件
        dom.hostFile.addEventListener('change', (e) => {
            fileToSend = e.target.files[0];
            if (fileToSend) {
                setStatus(dom.hostStatus, `已选择文件：${fileToSend.name} (${(fileToSend.size/1024/1024).toFixed(2)}MB)`, 'ok');
                dom.hostCreateOffer.disabled = false;
            }
        });

        // 1.2 房主点击：生成 Offer（我的名片）
        dom.hostCreateOffer.addEventListener('click', async () => {
            setStatus(dom.hostStatus, '正在创建P2P连接并生成名片...', 'info');

            // 1. 创建房主的 RTCPeerConnection 对象
            hostPeer = new RTCPeerConnection(CONFIG);

            // 2. 创建数据传输通道（用于传文件）
            hostChannel = hostPeer.createDataChannel('fileTransfer');
            
            // 3. 监听通道状态
            hostChannel.onopen = () => {
                setStatus(dom.transferStatus, '✅ P2P连接已建立！准备发送文件...', 'ok');
                // 连接建立后，直接开始发送文件
                sendFile();
            };
            
            hostChannel.onclose = () => {
                setStatus(dom.transferStatus, '连接已关闭', 'info');
            };

            // 4. 生成 Offer (SDP: 会话描述协议，也就是“我的网络名片”)
            const offer = await hostPeer.createOffer();
            await hostPeer.setLocalDescription(offer);

            // 5. 等待 ICE 候选收集完成（简单处理：等1秒后直接显示）
            // ICE候选：就是“我有哪些网络地址可以连”
            setTimeout(() => {
                dom.hostOffer.value = JSON.stringify(hostPeer.localDescription);
                dom.hostCopyOffer.disabled = false;
                dom.hostConnect.disabled = false;
                setStatus(dom.hostStatus, '✅ 房主名片生成成功！请复制发给接收方', 'ok');
            }, 1000);
        });

        // 1.3 复制房主名片
        dom.hostCopyOffer.addEventListener('click', () => {
            dom.hostOffer.select();
            document.execCommand('copy');
            setStatus(dom.hostStatus, '✅ 房主名片已复制到剪贴板', 'ok');
        });

        // 1.4 房主粘贴 Answer 并连接
        dom.hostConnect.addEventListener('click', async () => {
            const answerStr = dom.hostAnswer.value.trim();
            if (!answerStr) {
                setStatus(dom.hostStatus, '请先粘贴接收方的名片！', 'err');
                return;
            }

            try {
                const answer = JSON.parse(answerStr);
                // 设置远程描述（也就是“接收方的名片”）
                await hostPeer.setRemoteDescription(new RTCSessionDescription(answer));
                setStatus(dom.hostStatus, '✅ 已接收对方名片，等待连接建立...', 'ok');
            } catch (e) {
                setStatus(dom.hostStatus, '名片格式错误：' + e.message, 'err');
            }
        });

        // ==========================================
        // 第二步：接收方逻辑
        // ==========================================

        // 2.1 接收方粘贴 Offer 后，激活按钮
        dom.clientOffer.addEventListener('input', () => {
            if (dom.clientOffer.value.trim()) {
                dom.clientCreateAnswer.disabled = false;
            }
        });

        // 2.2 接收方点击：生成 Answer（我的名片）
        dom.clientCreateAnswer.addEventListener('click', async () => {
            const offerStr = dom.clientOffer.value.trim();
            if (!offerStr) {
                setStatus(dom.clientStatus, '请先粘贴房主的名片！', 'err');
                return;
            }

            setStatus(dom.clientStatus, '正在解析房主名片并生成我的名片...', 'info');

            try {
                const offer = JSON.parse(offerStr);

                // 1. 创建接收方的 RTCPeerConnection 对象
                clientPeer = new RTCPeerConnection(CONFIG);

                // 2. 监听数据通道（等待房主建立通道）
                clientPeer.ondatachannel = (event) => {
                    const receiveChannel = event.channel;
                    setStatus(dom.transferStatus, '✅ P2P连接已建立！准备接收文件...', 'ok');
                    
                    // 接收文件数据
                    let receivedBuffer = [];
                    receiveChannel.onmessage = (e) => {
                        // 如果收到的是字符串 "done"，表示传输结束
                        if (e.data === 'done') {
                            // 把所有收到的数据块拼起来
                            const blob = new Blob(receivedBuffer);
                            const url = URL.createObjectURL(blob);
                            
                            // 显示下载链接
                            dom.fileResult.innerHTML = `
                                <p style="font-weight:bold;">✅ 文件接收完成！</p>
                                <a href="${url}" download="received_file">点击下载文件</a>
                            `;
                            setStatus(dom.transferStatus, '✅ 文件传输成功！', 'ok');
                            return;
                        }
                        // 否则，把数据块存起来
                        receivedBuffer.push(e.data);
                    };
                };

                // 3. 设置远程描述（房主的名片）
                await clientPeer.setRemoteDescription(new RTCSessionDescription(offer));

                // 4. 生成 Answer（我的名片）
                const answer = await clientPeer.createAnswer();
                await clientPeer.setLocalDescription(answer);

                // 5. 等待 ICE 候选收集
                setTimeout(() => {
                    dom.clientAnswer.value = JSON.stringify(clientPeer.localDescription);
                    dom.clientCopyAnswer.disabled = false;
                    setStatus(dom.clientStatus, '✅ 我的名片生成成功！请复制发回房主', 'ok');
                }, 1000);

            } catch (e) {
                setStatus(dom.clientStatus, '处理失败：' + e.message, 'err');
            }
        });

        // 2.3 复制接收方名片
        dom.clientCopyAnswer.addEventListener('click', () => {
            dom.clientAnswer.select();
            document.execCommand('copy');
            setStatus(dom.clientStatus, '✅ 我的名片已复制到剪贴板', 'ok');
        });

        // ==========================================
        // 第三步：发送文件逻辑
        // ==========================================
        function sendFile() {
            if (!fileToSend || !hostChannel) return;

            setStatus(dom.transferStatus, `📤 正在发送文件：${fileToSend.name}...`, 'info');

            const reader = new FileReader();
            
            // 把文件读取为 ArrayBuffer
            reader.onload = (e) => {
                const buffer = e.target.result;
                const chunkSize = 16384; // 每次发送 16KB (WebRTC推荐的块大小)
                let offset = 0;

                // 分块发送函数
                function sendNextChunk() {
                    while (offset < buffer.byteLength) {
                        const chunk = buffer.slice(offset, offset + chunkSize);
                        offset += chunk.byteLength;
                        
                        // 发送数据块
                        hostChannel.send(chunk);

                        // 如果缓冲区满了，等待 drain 事件（防止内存溢出）
                        if (hostChannel.bufferedAmount > 65535) {
                            hostChannel.onbufferedamountlow = sendNextChunk;
                            return;
                        }
                    }
                    // 全部发完后，发送一个 "done" 信号
                    hostChannel.send('done');
                    setStatus(dom.transferStatus, '✅ 文件发送完毕！', 'ok');
                }

                // 开始发送
                sendNextChunk();
            };

            reader.readAsArrayBuffer(fileToSend);
        }

        // 页面加载完成提示
        setStatus(dom.hostStatus, '页面就绪，请选择文件开始', 'info');
        setStatus(dom.clientStatus, '页面就绪，等待房主名片', 'info');

    </script>
</body>
</html>
