<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强版P2P文件传输</title>
    <style>
        body { max-width: 700px; margin: 20px auto; padding: 20px; font-family: Arial, sans-serif; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; font-size: 18px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px 0; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; font-size: 12px; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; }
        .ok { background: #d4edda; color: #155724; }
        .err { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        input[type="file"] { margin: 10px 0; }
        .progress-container { margin: 15px 0; }
        .progress-bar { height: 25px; background: #e9ecef; border-radius: 5px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #007bff, #28a745); width: 0%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; }
        .file-list { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
        .file-item { padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .file-item:last-child { border-bottom: none; }
        .file-name { font-weight: 500; }
        .file-size { color: #666; font-size: 12px; }
        .download-link { display: block; margin-top: 10px; padding: 12px; background: #28a745; color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .download-link:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>🚀 增强版P2P文件传输</h1>

    <!-- ========================================== -->
    <!-- 第一步：房主（发起连接的人） -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📤 第一步：我是房主（发起连接）</h2>
        <div id="host-status" class="status info">等待操作...</div>
        
        <!-- 1. 选择要发送的文件（支持多文件） -->
        <input type="file" id="host-file" multiple>
        <div id="host-file-list" class="file-list" style="display: none;"></div>
        
        <!-- 2. 点击生成“我的名片” (Offer) -->
        <button id="host-create-offer" disabled>1. 生成我的连接名片 (Offer)</button>
        
        <!-- 3. 复制“我的名片”发给对方 -->
        <textarea id="host-offer" readonly placeholder="这里会显示房主的Offer名片，复制发给接收方"></textarea>
        <button id="host-copy-offer" disabled>复制房主名片</button>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">

        <!-- 4. 粘贴“对方的名片” (Answer) -->
        <p>粘贴接收方发回的名片 (Answer)：</p>
        <textarea id="host-answer" placeholder="在这里粘贴接收方的Answer名片"></textarea>
        <button id="host-connect" disabled>2. 确认连接</button>
    </div>

    <!-- ========================================== -->
    <!-- 第二步：接收方（加入连接的人） -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📥 第二步：我是接收方（加入连接）</h2>
        <div id="client-status" class="status info">等待操作...</div>

        <!-- 1. 粘贴“房主的名片” (Offer) -->
        <p>粘贴房主发来的名片 (Offer)：</p>
        <textarea id="client-offer" placeholder="在这里粘贴房主的Offer名片"></textarea>
        <button id="client-create-answer" disabled>1. 生成我的名片 (Answer)</button>

        <!-- 2. 复制“我的名片”发回给房主 -->
        <textarea id="client-answer" readonly placeholder="这里会显示接收方的Answer名片，复制发回房主"></textarea>
        <button id="client-copy-answer" disabled>复制我的名片</button>
    </div>

    <!-- ========================================== -->
    <!-- 第三步：传输文件 -->
    <!-- ========================================== -->
    <div class="box">
        <h2>📁 第三步：文件传输</h2>
        <div id="transfer-status" class="status info">等待连接建立...</div>
        
        <!-- 进度条 -->
        <div class="progress-container" id="progress-container" style="display: none;">
            <div id="current-file-name" style="margin-bottom: 5px; font-weight: 500;"></div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill">0%</div>
            </div>
            <div id="progress-text" style="margin-top: 5px; font-size: 13px; color: #666;"></div>
        </div>

        <!-- 接收的文件列表 -->
        <div id="received-files" class="file-list" style="display: none;">
            <h3 style="margin-top: 0; margin-bottom: 10px;">📦 已接收的文件：</h3>
            <div id="files-container"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. 全局配置与变量
        // ==========================================
        
        const CONFIG = {
            iceServers: [
                { urls: 'stun:stun.qq.com:3478' },
                { urls: 'stun:stun.cloudflare.com:3478' }
            ]
        };

        let hostPeer = null;
        let clientPeer = null;
        let filesToSend = [];
        let hostChannel = null;
        let receivedFiles = [];

        const dom = {
            hostStatus: document.getElementById('host-status'),
            clientStatus: document.getElementById('client-status'),
            transferStatus: document.getElementById('transfer-status'),
            hostFile: document.getElementById('host-file'),
            hostFileList: document.getElementById('host-file-list'),
            hostCreateOffer: document.getElementById('host-create-offer'),
            hostOffer: document.getElementById('host-offer'),
            hostCopyOffer: document.getElementById('host-copy-offer'),
            hostAnswer: document.getElementById('host-answer'),
            hostConnect: document.getElementById('host-connect'),
            clientOffer: document.getElementById('client-offer'),
            clientCreateAnswer: document.getElementById('client-create-answer'),
            clientAnswer: document.getElementById('client-answer'),
            clientCopyAnswer: document.getElementById('client-copy-answer'),
            progressContainer: document.getElementById('progress-container'),
            progressFill: document.getElementById('progress-fill'),
            progressText: document.getElementById('progress-text'),
            currentFileName: document.getElementById('current-file-name'),
            receivedFiles: document.getElementById('received-files'),
            filesContainer: document.getElementById('files-container')
        };

        // ==========================================
        // 辅助函数
        // ==========================================
        function setStatus(element, text, type = 'info') {
            element.textContent = text;
            element.className = `status ${type}`;
            console.log(`[${type.toUpperCase()}]`, text);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateProgress(percent, fileName, sent, total) {
            dom.progressContainer.style.display = 'block';
            dom.currentFileName.textContent = `📄 当前文件：${fileName}`;
            dom.progressFill.style.width = `${percent}%`;
            dom.progressFill.textContent = `${percent}%`;
            dom.progressText.textContent = `已传输：${formatSize(sent)} / ${formatSize(total)}`;
        }

        // ==========================================
        // 第一步：房主逻辑
        // ==========================================

        dom.hostFile.addEventListener('change', (e) => {
            filesToSend = Array.from(e.target.files);
            if (filesToSend.length > 0) {
                let html = '<h3 style="margin-top: 0; margin-bottom: 10px;">📦 已选择的文件：</h3>';
                let totalSize = 0;
                filesToSend.forEach((file, index) => {
                    html += `
                        <div class="file-item">
                            <span class="file-name">${index + 1}. ${file.name}</span>
                            <span class="file-size">${formatSize(file.size)}</span>
                        </div>
                    `;
                    totalSize += file.size;
                });
                dom.hostFileList.innerHTML = html;
                dom.hostFileList.style.display = 'block';
                setStatus(dom.hostStatus, `已选择 ${filesToSend.length} 个文件，共 ${formatSize(totalSize)}`, 'ok');
                dom.hostCreateOffer.disabled = false;
            }
        });

        dom.hostCreateOffer.addEventListener('click', async () => {
            setStatus(dom.hostStatus, '正在创建P2P连接并生成名片...', 'info');

            hostPeer = new RTCPeerConnection(CONFIG);
            hostChannel = hostPeer.createDataChannel('fileTransfer');
            
            hostChannel.onopen = () => {
                setStatus(dom.transferStatus, '✅ P2P连接已建立！准备发送文件...', 'ok');
                sendFiles();
            };
            
            hostChannel.onclose = () => {
                setStatus(dom.transferStatus, '连接已关闭', 'info');
            };

            const offer = await hostPeer.createOffer();
            await hostPeer.setLocalDescription(offer);

            setTimeout(() => {
                dom.hostOffer.value = JSON.stringify(hostPeer.localDescription);
                dom.hostCopyOffer.disabled = false;
                dom.hostConnect.disabled = false;
                setStatus(dom.hostStatus, '✅ 房主名片生成成功！请复制发给接收方', 'ok');
            }, 1000);
        });

        dom.hostCopyOffer.addEventListener('click', () => {
            dom.hostOffer.select();
            document.execCommand('copy');
            setStatus(dom.hostStatus, '✅ 房主名片已复制到剪贴板', 'ok');
        });

        dom.hostConnect.addEventListener('click', async () => {
            const answerStr = dom.hostAnswer.value.trim();
            if (!answerStr) {
                setStatus(dom.hostStatus, '请先粘贴接收方的名片！', 'err');
                return;
            }

            try {
                const answer = JSON.parse(answerStr);
                await hostPeer.setRemoteDescription(new RTCSessionDescription(answer));
                setStatus(dom.hostStatus, '✅ 已接收对方名片，等待连接建立...', 'ok');
            } catch (e) {
                setStatus(dom.hostStatus, '名片格式错误：' + e.message, 'err');
            }
        });

        // ==========================================
        // 发送多文件逻辑
        // ==========================================
        async function sendFiles() {
            if (filesToSend.length === 0 || !hostChannel) return;

            try {
                // 1. 先发送文件数量
                hostChannel.send(JSON.stringify({
                    type: 'file-count',
                    count: filesToSend.length
                }));

                // 2. 逐个发送文件
                for (let fileIndex = 0; fileIndex < filesToSend.length; fileIndex++) {
                    const file = filesToSend[fileIndex];
                    setStatus(dom.transferStatus, `📤 正在发送 (${fileIndex + 1}/${filesToSend.length})：${file.name}`, 'info');

                    // 读取文件
                    const arrayBuffer = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsArrayBuffer(file);
                    });

                    // 发送文件信息
                    hostChannel.send(JSON.stringify({
                        type: 'file-info',
                        name: file.name,
                        size: file.size,
                        type: file.type
                    }));

                    // 分块发送文件数据
                    const chunkSize = 16384;
                    let offset = 0;
                    let totalSent = 0;

                    while (offset < arrayBuffer.byteLength) {
                        const chunk = arrayBuffer.slice(offset, offset + chunkSize);
                        hostChannel.send(chunk);
                        offset += chunk.byteLength;
                        totalSent += chunk.byteLength;

                        // 更新进度
                        const percent = Math.round((totalSent / arrayBuffer.byteLength) * 100);
                        updateProgress(percent, file.name, totalSent, arrayBuffer.byteLength);

                        // 防止缓冲区溢出
                        if (hostChannel.bufferedAmount > 65535) {
                            await new Promise(resolve => {
                                hostChannel.onbufferedamountlow = resolve;
                            });
                        }
                    }

                    // 发送文件完成标记
                    hostChannel.send(JSON.stringify({ type: 'file-end' }));
                }

                // 所有文件发送完成
                hostChannel.send(JSON.stringify({ type: 'transfer-complete' }));
                setStatus(dom.transferStatus, `✅ 所有文件发送完成！共 ${filesToSend.length} 个`, 'ok');
                updateProgress(100, '传输完成', 0, 0);

            } catch (e) {
                setStatus(dom.transferStatus, '❌ 发送失败：' + e.message, 'err');
            }
        }

        // ==========================================
        // 第二步：接收方逻辑
        // ==========================================

        dom.clientOffer.addEventListener('input', () => {
            if (dom.clientOffer.value.trim()) {
                dom.clientCreateAnswer.disabled = false;
            }
        });

        dom.clientCreateAnswer.addEventListener('click', async () => {
            const offerStr = dom.clientOffer.value.trim();
            if (!offerStr) {
                setStatus(dom.clientStatus, '请先粘贴房主的名片！', 'err');
                return;
            }

            setStatus(dom.clientStatus, '正在解析房主名片并生成我的名片...', 'info');

            try {
                const offer = JSON.parse(offerStr);
                clientPeer = new RTCPeerConnection(CONFIG);

                let currentFileInfo = null;
                let receivedChunks = [];
                let totalReceived = 0;
                let fileCount = 0;
                let receivedFileCount = 0;

                clientPeer.ondatachannel = (event) => {
                    const receiveChannel = event.channel;
                    setStatus(dom.transferStatus, '✅ P2P连接已建立！准备接收文件...', 'ok');
                    dom.receivedFiles.style.display = 'block';

                    receiveChannel.onmessage = async (e) => {
                        if (typeof e.data === 'string') {
                            const message = JSON.parse(e.data);
                            
                            switch (message.type) {
                                case 'file-count':
                                    fileCount = message.count;
                                    setStatus(dom.transferStatus, `📥 准备接收 ${fileCount} 个文件...`, 'info');
                                    break;
                                    
                                case 'file-info':
                                    currentFileInfo = message;
                                    receivedChunks = [];
                                    totalReceived = 0;
                                    receivedFileCount++;
                                    setStatus(dom.transferStatus, `📥 正在接收 (${receivedFileCount}/${fileCount})：${currentFileInfo.name}`, 'info');
                                    break;
                                    
                                case 'file-end':
                                    // 组装文件
                                    const blob = new Blob(receivedChunks, { type: currentFileInfo.type });
                                    const url = URL.createObjectURL(blob);
                                    
                                    // 添加到已接收文件列表
                                    const fileHtml = `
                                        <div class="file-item">
                                            <span class="file-name">${receivedFileCount}. ${currentFileInfo.name}</span>
                                            <span class="file-size">${formatSize(currentFileInfo.size)}</span>
                                        </div>
                                        <a href="${url}" download="${currentFileInfo.name}" class="download-link">💾 下载 ${currentFileInfo.name}</a>
                                    `;
                                    dom.filesContainer.innerHTML += fileHtml;
                                    
                                    // 重置进度
                                    updateProgress(100, currentFileInfo.name, currentFileInfo.size, currentFileInfo.size);
                                    break;
                                    
                                case 'transfer-complete':
                                    setStatus(dom.transferStatus, `✅ 所有文件接收完成！共 ${receivedFileCount} 个`, 'ok');
                                    updateProgress(100, '传输完成', 0, 0);
                                    break;
                            }
                        } else {
                            // 接收数据块
                            receivedChunks.push(e.data);
                            totalReceived += e.data.byteLength;
                            
                            if (currentFileInfo) {
                                const percent = Math.round((totalReceived / currentFileInfo.size) * 100);
                                updateProgress(percent, currentFileInfo.name, totalReceived, currentFileInfo.size);
                            }
                        }
                    };
                };

                await clientPeer.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await clientPeer.createAnswer();
                await clientPeer.setLocalDescription(answer);

                setTimeout(() => {
                    dom.clientAnswer.value = JSON.stringify(clientPeer.localDescription);
                    dom.clientCopyAnswer.disabled = false;
                    setStatus(dom.clientStatus, '✅ 我的名片生成成功！请复制发回房主', 'ok');
                }, 1000);

            } catch (e) {
                setStatus(dom.clientStatus, '处理失败：' + e.message, 'err');
            }
        });

        dom.clientCopyAnswer.addEventListener('click', () => {
            dom.clientAnswer.select();
            document.execCommand('copy');
            setStatus(dom.clientStatus, '✅ 我的名片已复制到剪贴板', 'ok');
        });

        setStatus(dom.hostStatus, '页面就绪，请选择文件开始', 'info');
        setStatus(dom.clientStatus, '页面就绪，等待房主名片', 'info');

    </script>
</body>
</html>
