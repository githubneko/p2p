<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>极简跨设备文件传输</title>
<style>
*{box-sizing:border-box}
body{max-width:500px;margin:30px auto;padding:0 20px;background:#f6f7f9;font-family:system-ui}
.card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 10px #0001}
h1{text-align:center;font-size:22px;margin-bottom:20px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:#007bff;color:white;font-size:16px;margin:8px 0;cursor:pointer}
.btn:disabled{background:#ccc}
.area{margin:12px 0}
textarea{width:100%;height:90px;border-radius:8px;border:1px solid #ddd;padding:10px;font-size:12px;resize:none}
.status{padding:10px 12px;border-radius:8px;margin:10px 0;font-size:14px}
.info{background:#e7f2ff;color:#0066cc}
.ok{background:#e8f5e9;color:#1f7522}
.err{background:#ffebee;color:#c62828}
.download{display:block;padding:12px;background:#007bff;color:white;text-align:center;border-radius:10px;margin-top:12px;text-decoration:none}
</style>
</head>
<body>

<h1>📤 极简文件传输</h1>

<div class="card">
  <div class="status info" id="s1">选择文件生成分享链接</div>
  <input type="file" id="file" class="btn" style="background:#34c759">
  <button class="btn" id="copy" disabled>复制分享链接</button>
  <div class="area">
    <textarea id="link" readonly placeholder="生成后显示链接"></textarea>
  </div>
</div>

<div class="card">
  <div class="status info" id="s2">粘贴链接下载</div>
  <div class="area">
    <textarea id="input" placeholder="粘贴链接"></textarea>
  </div>
  <button class="btn" id="down">开始下载</button>
  <div id="result"></div>
</div>

<script>
// 存储文件：key=随机码, value=文件
const FILE_STORE = {}

// ======================================
// 生成分享链接
// ======================================
file.onchange = async () => {
  const f = file.files[0]
  if (!f) return
  const key = Math.random().toString(36).slice(2,10)
  FILE_STORE[key] = f

  const host = location.origin + location.pathname.split('/').slice(0,-1).join('/')
  const url = host + '#key=' + key

  link.value = url
  copy.disabled = false
  s1.className = 'status ok'
  s1.textContent = '✅ 链接已生成'
}

// ======================================
// 复制链接
// ======================================
copy.onclick = () => {
  link.select()
  document.execCommand('copy')
  s1.textContent = '✅ 已复制'
}

// ======================================
// 下载
// ======================================
down.onclick = () => {
  const val = input.value.trim()
  const match = val.match(/#key=([a-z0-9]+)/)
  if (!match) {
    s2.className = 'status err'
    s2.textContent = '❌ 链接格式不对'
    return
  }
  const key = match[1]
  const file = FILE_STORE[key]
  if (!file) {
    s2.className = 'status err'
    s2.textContent = '❌ 文件不在线或已断开'
    return
  }

  s2.className = 'status ok'
  s2.textContent = '✅ 下载完成'
  
  const u = URL.createObjectURL(file)
  const a = document.createElement('a')
  a.className = 'download'
  a.href = u
  a.download = file.name
  a.textContent = '💾 保存 ' + file.name
  result.innerHTML = ''
  result.appendChild(a)
}

// ======================================
// 打开页面自动解析链接
// ======================================
window.onload = () => {
  if (location.hash.includes('key=')) {
    input.value = location.href
    s2.textContent = '📥 已自动识别链接'
  }
}
</script>
</body>
</html>
