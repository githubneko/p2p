<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简P2P文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f7fa;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-host {
            background: #007aff;
            color: white;
        }
        .btn-host:hover {
            background: #0056cc;
        }
        .btn-join {
            background: #34c759;
            color: white;
        }
        .btn-join:hover {
            background: #28a745;
        }
        .btn-send {
            background: #ff9500;
            color: white;
            width: 100%;
            margin-top: 12px;
        }
        .btn-send:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }
        .status-info {
            background: #e5f2ff;
            color: #0066cc;
        }
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        .signal-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #495057;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
        }
        .file-area {
            display: none;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
            font-size: 14px;
        }
        .file-result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>📤 极简P2P文件传输</h1>

    <div class="container">
        <div class="btn-group">
            <button class="btn-host" onclick="createConnection()">创建连接（房主）</button>
            <button class="btn-join" onclick="joinConnection()">加入连接（接收方）</button>
        </div>

        <div id="status" class="status status-info">
            选择角色开始连接，支持电脑↔手机跨设备传输
        </div>

        <div id="signalBox" class="signal-box hidden">
            信令将在这里显示，自动复制到剪贴板
        </div>

        <div id="fileArea" class="file-area">
            <input type="file" id="fileInput" accept="*">
            <button class="btn-send" id="sendBtn" disabled onclick="sendFile()">发送文件</button>
            <div id="fileResult" class="file-result"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script>
        let peer = null;
        let isHost = false;
        const statusEl = document.getElementById('status');
        const signalBox = document.getElementById('signalBox');
        const fileArea = document.getElementById('fileArea');
        const sendBtn = document.getElementById('sendBtn');
        const fileResult = document.getElementById('fileResult');

        // 更新状态提示
        function updateStatus(text, type = 'info') {
            statusEl.textContent = text;
            statusEl.className = `status status-${type}`;
        }

        // 自动复制到剪贴板
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                updateStatus('✅ 信令已自动复制到剪贴板，发给对方', 'success');
                signalBox.textContent = text;
                signalBox.classList.remove('hidden');
            } catch (err) {
                updateStatus('⚠️ 自动复制失败，请手动复制下方信令', 'error');
                signalBox.textContent = text;
                signalBox.classList.remove('hidden');
            }
        }

        // 自动从剪贴板读取信令
        async function pasteFromClipboard() {
            try {
                return await navigator.clipboard.readText();
            } catch (err) {
                updateStatus('⚠️ 自动读取剪贴板失败，请手动粘贴信令', 'error');
                return prompt('请粘贴对方发来的信令：');
            }
        }

        // 重置所有状态
        function resetAll() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            isHost = false;
            signalBox.classList.add('hidden');
            fileArea.style.display = 'none';
            sendBtn.disabled = true;
            fileResult.innerHTML = '';
            updateStatus('已重置，选择角色重新开始', 'info');
        }

        // ==================== 房主逻辑（创建连接） ====================
        async function createConnection() {
            resetAll();
            isHost = true;
            updateStatus('🔄 正在生成连接信令...', 'info');

            // 创建P2P实例（房主为发起方）
            peer = new SimplePeer({
                initiator: true,
                trickle: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.qq.com:3478' },
                        { urls: 'stun:stun.cloudflare.com:3478' }
                    ]
                }
            });

            // 生成信令并自动复制
            peer.on('signal', async (signal) => {
                const signalText = JSON.stringify(signal);
                await copyToClipboard(signalText);
            });

            // 连接成功
            peer.on('connect', () => {
                updateStatus('✅ P2P连接成功！可以传输文件', 'success');
                signalBox.classList.add('hidden');
                fileArea.style.display = 'block';
                sendBtn.disabled = false;
            });

            // 接收文件
            peer.on('data', (data) => {
                try {
                    const fileData = JSON.parse(data);
                    const blob = new Blob([Uint8Array.from(fileData.buf)], { type: fileData.type });
                    const url = URL.createObjectURL(blob);
                    fileResult.innerHTML = `
                        ✅ 收到文件：<a href="${url}" download="${fileData.name}" style="color: #007aff; text-decoration: none;">${fileData.name}</a>
                    `;
                } catch (e) {
                    fileResult.innerHTML = '❌ 文件接收失败';
                }
            });

            // 错误处理
            peer.on('error', (err) => {
                updateStatus(`❌ 连接错误：${err.message}`, 'error');
            });
        }

        // ==================== 接收方逻辑（加入连接） ====================
        async function joinConnection() {
            resetAll();
            isHost = false;
            updateStatus('🔄 正在读取信令并建立连接...', 'info');

            // 自动读取剪贴板中的房主信令
            const hostSignalText = await pasteFromClipboard();
            if (!hostSignalText) {
                updateStatus('❌ 未获取到有效信令', 'error');
                return;
            }

            try {
                const hostSignal = JSON.parse(hostSignalText);

                // 创建P2P实例（接收方为被动方）
                peer = new SimplePeer({
                    initiator: false,
                    trickle: true,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.qq.com:3478' },
                            { urls: 'stun:stun.cloudflare.com:3478' }
                        ]
                    }
                });

                // 生成回信令并自动复制
                peer.on('signal', async (signal) => {
                    const replySignalText = JSON.stringify(signal);
                    await copyToClipboard(replySignalText);
                });

                // 导入房主信令
                peer.signal(hostSignal);

                // 连接成功
                peer.on('connect', () => {
                    updateStatus('✅ P2P连接成功！可以传输文件', 'success');
                    signalBox.classList.add('hidden');
                    fileArea.style.display = 'block';
                    sendBtn.disabled = false;
                });

                // 接收文件
                peer.on('data', (data) => {
                    try {
                        const fileData = JSON.parse(data);
                        const blob = new Blob([Uint8Array.from(fileData.buf)], { type: fileData.type });
                        const url = URL.createObjectURL(blob);
                        fileResult.innerHTML = `
                            ✅ 收到文件：<a href="${url}" download="${fileData.name}" style="color: #007aff; text-decoration: none;">${fileData.name}</a>
                        `;
                    } catch (e) {
                        fileResult.innerHTML = '❌ 文件接收失败';
                    }
                });

                // 错误处理
                peer.on('error', (err) => {
                    updateStatus(`❌ 连接错误：${err.message}`, 'error');
                });

            } catch (e) {
                updateStatus('❌ 信令格式错误，请重新获取', 'error');
            }
        }

        // ==================== 文件传输逻辑 ====================
        function sendFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                updateStatus('⚠️ 请先选择要发送的文件', 'error');
                return;
            }
            if (!peer || !peer.connected) {
                updateStatus('❌ P2P连接未建立，无法发送文件', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const fileData = {
                    name: file.name,
                    type: file.type || 'application/octet-stream',
                    buf: Array.from(new Uint8Array(e.target.result))
                };
                peer.send(JSON.stringify(fileData));
                fileResult.innerHTML = `✅ 已发送：${file.name}`;
                updateStatus('✅ 文件发送成功', 'success');
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
